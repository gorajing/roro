# CI — the enforced green-signal gate (M6a). Roro had no CI: tsc/lint/tests were green only when someone
# remembered to run them locally. This runs the SAME three checks on every PR + push to main, so a
# regression can't merge silently. Tests run serialized (vitest.config fileParallelism:false) to avoid the
# PGlite-under-contention flakiness; the opt-in live-brain tests skip without OLLAMA_AVAILABLE.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the in-flight run (don't waste minutes on superseded commits).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test
    runs-on: ubuntu-latest # the checks are pure Node (tsc/eslint/vitest); the app is macOS but the tests aren't
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Plain `npm ci` (no ELECTRON_SKIP_BINARY_DOWNLOAD) so CI matches the local env where green is proven —
      # some main-process modules import 'electron', and skipping the binary could fail only in CI.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  release-artifact:
    name: package · release artifact
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release doctor
        run: npm run release:doctor

      # No voice sentinel seeding anymore: the voice stack (deps + staging + forge gates) lives in
      # packages/voice, outside the app's dependency graph — the packaged app is voice-free by
      # construction, and verify-release-artifact keeps a cheap tripwire scan on the asar.
      - name: Make default macOS app and DMG
        run: npm run make

      - name: Verify release artifact
        run: |
          npm run verify:release-artifact
          npm run verify:release-artifact:dmg

  # Guards the memory spine end-to-end on the REAL packaged .app: this is the smoke whose 8 assertions
  # silently rotted when W5 reshaped the debug bridge (see scripts/lib/packagedHarness.mjs). Isolated in
  # its own job so a macOS-runner hiccup can't redden the pure-Node checks or the release artifact.
  packaged-memory-smoke:
    name: packaged memory smoke (encrypted persist + relaunch)
    runs-on: macos-latest # drives the real .app over CDP; macOS-only (Electron safeStorage keychain + the .app bundle)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build the unpacked .app (lighter than `make` — no DMG). The smoke launches
      # out/Roro-darwin-<arch>/Roro.app twice over the Chrome DevTools Protocol.
      - name: Package the app
        run: npm run package

      # Deterministic, headless-capable subset ONLY: this mode forces local Ollama offline (a dead port
      # with a 250ms timeout), so it needs no models and no network. It proves encrypted memory writes,
      # stays sealed on disk (no plaintext token in any file), and recalls the SAME durable row after a
      # full relaunch — the CI guard against the debug-bridge shape drift that this PR fixes.
      #
      # NOT wired here (manual-only): verify:packaged-live-memory-turn and verify:packaged-natural-memory-turn
      # need a local Ollama + pulled models, and their narrated answer is LLM-nondeterministic (the codename
      # echo flakes run-to-run) — they would make CI flaky, so they stay a local/manual gate.
      - name: Verify packaged encrypted memory (offline, no Ollama)
        run: npm run verify:packaged-memory
