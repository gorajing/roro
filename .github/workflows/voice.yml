# Voice sub-package CI — PATH-FILTERED so the app's every-PR pipeline never pays the ~510MB voice
# dependency install. packages/voice is a standalone sub-package (NOT an npm workspace — see its
# README.md): it owns all voice deps (@huggingface/transformers, vad-web, phonemize, onnxruntime-web)
# and its own tests, INCLUDING the ttsLicenseFirewall GPL/eSpeak guard. This job is what keeps that
# firewall CI-alive now that voice is out of the root graph.
name: Voice

on:
  pull_request:
    paths:
      - 'packages/voice/**'
  push:
    branches: [main]
    paths:
      - 'packages/voice/**'

concurrency:
  group: voice-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: voice typecheck · test (incl. ttsLicenseFirewall)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/voice
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/voice/package-lock.json

      - name: Install voice dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test (includes the GPL/eSpeak license firewall)
        run: npx vitest run
