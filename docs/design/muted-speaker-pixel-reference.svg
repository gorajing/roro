<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Pixelated muted speaker reference</title>
  <desc id="desc">A crisp pixel-art version of a muted speaker symbol with a red prohibition ring and diagonal slash.</desc>
  <defs>
    <style>
      .px { shape-rendering: crispEdges; }
      .bg { fill: #ffffff; }
      .red { fill: #cc202b; }
      .ink { fill: #22272b; }
    </style>
  </defs>

  <rect class="bg px" width="160" height="160"/>

  <g class="px" aria-label="red prohibition ring">
    <rect class="red" x="56" y="8" width="48" height="8"/>
    <rect class="red" x="40" y="16" width="80" height="8"/>
    <rect class="red" x="32" y="24" width="16" height="8"/>
    <rect class="red" x="112" y="24" width="16" height="8"/>
    <rect class="red" x="24" y="32" width="16" height="8"/>
    <rect class="red" x="120" y="32" width="16" height="8"/>
    <rect class="red" x="16" y="40" width="16" height="16"/>
    <rect class="red" x="128" y="40" width="16" height="16"/>
    <rect class="red" x="8" y="56" width="16" height="48"/>
    <rect class="red" x="136" y="56" width="16" height="48"/>
    <rect class="red" x="16" y="104" width="16" height="16"/>
    <rect class="red" x="128" y="104" width="16" height="16"/>
    <rect class="red" x="24" y="120" width="16" height="8"/>
    <rect class="red" x="120" y="120" width="16" height="8"/>
    <rect class="red" x="32" y="128" width="16" height="8"/>
    <rect class="red" x="112" y="128" width="16" height="8"/>
    <rect class="red" x="40" y="136" width="80" height="8"/>
    <rect class="red" x="56" y="144" width="48" height="8"/>
  </g>

  <g class="px" aria-label="speaker">
    <rect class="ink" x="40" y="64" width="24" height="40"/>
    <rect class="ink" x="64" y="64" width="8" height="40"/>
    <rect class="ink" x="72" y="56" width="8" height="56"/>
    <rect class="ink" x="80" y="48" width="8" height="72"/>
    <rect class="ink" x="88" y="40" width="8" height="88"/>
  </g>

  <g class="px" aria-label="sound waves">
    <rect class="ink" x="104" y="56" width="8" height="8"/>
    <rect class="ink" x="112" y="64" width="8" height="8"/>
    <rect class="ink" x="120" y="72" width="8" height="24"/>
    <rect class="ink" x="112" y="96" width="8" height="8"/>
    <rect class="ink" x="104" y="104" width="8" height="8"/>

    <rect class="ink" x="120" y="40" width="8" height="8"/>
    <rect class="ink" x="128" y="48" width="8" height="8"/>
    <rect class="ink" x="136" y="56" width="8" height="48"/>
    <rect class="ink" x="128" y="104" width="8" height="8"/>
    <rect class="ink" x="120" y="112" width="8" height="8"/>
  </g>

  <g class="px" aria-label="red diagonal slash">
    <rect class="red" x="36" y="32" width="12" height="8"/>
    <rect class="red" x="44" y="40" width="12" height="8"/>
    <rect class="red" x="52" y="48" width="12" height="8"/>
    <rect class="red" x="60" y="56" width="12" height="8"/>
    <rect class="red" x="68" y="64" width="12" height="8"/>
    <rect class="red" x="76" y="72" width="12" height="8"/>
    <rect class="red" x="84" y="80" width="12" height="8"/>
    <rect class="red" x="92" y="88" width="12" height="8"/>
    <rect class="red" x="100" y="96" width="12" height="8"/>
    <rect class="red" x="108" y="104" width="12" height="8"/>
    <rect class="red" x="116" y="112" width="12" height="8"/>
    <rect class="red" x="124" y="120" width="12" height="8"/>
  </g>
</svg>
