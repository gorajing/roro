<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:*; font-src 'self' data:;" />
    <title>Roro</title>

    <!--
      Cubism Core MUST load (classic <script>, not import) BEFORE the renderer
      bundle: it attaches the global window.Live2DCubismCore that the Live2D
      plugin needs. Self-hosted at public/live2d/live2dcubismcore.min.js (served
      from the web root as /live2d/...). If the file is absent the avatar code
      detects the missing global and renders the placeholder instead — the app
      still boots. See public/live2d/README.md.
    -->
    <script src="/live2d/live2dcubismcore.min.js"></script>
  </head>
  <body>
    <div id="app">
      <canvas id="live2d-canvas"></canvas>

      <div id="overlay">
        <header id="topbar">
          <div id="brand">Roro</div>
          <div id="powered">
            Brain: <b>Local</b> · Ollama (qwen2.5) &nbsp;|&nbsp; Memory:
            <b>Local</b> · PGlite + pgvector
          </div>
          <div id="controls">
            <!-- Opt-in, consent-gated Voice Mode toggle. Clicking runs the readiness probe (mic + staged
                 weights) and either starts cleanly or says exactly what's missing (bootstrap.ts). -->
            <button id="voice-mode-btn" type="button" aria-pressed="false">🎙 Voice Mode</button>
            <!-- Disabled until the on-device voice path actually mounts (there is no mic to mute on the
                 default typed-only launch); bootstrap.ts enables it when a voice engine is summoned. -->
            <button id="mute-btn" type="button" disabled>Mute</button>
          </div>
        </header>

        <!-- Polite live region: every setStatus line (model-load, Voice Mode blockers, FSM transitions) is
             announced to screen readers — the fail-loud "tell the user what's missing" promise must be audible. -->
        <div id="status" role="status" aria-live="polite">Loading…</div>

        <section id="captions">
          <div id="caption-final" class="caption"></div>
          <div id="caption-partial" class="caption partial"></div>
        </section>

        <!--
          Text-input path. Drives the SAME orchestrator pipeline as the on-device voice
          (window.companion.turnRun -> recall[memory2/PGlite] -> decide[local Ollama] ->
          executor[Codex]) but needs no microphone, so it is the default surface and the
          reliable demo path when the Electron mic misbehaves. See bootstrap.ts.
        -->
        <form id="prompt-form" autocomplete="off">
          <input
            id="prompt-input"
            type="text"
            placeholder="Type a task — e.g. &quot;fix the failing test in calc.py&quot;"
          />
          <button id="send-btn" type="submit">Send</button>
          <button id="cancel-btn" type="button" disabled>Stop</button>
        </form>

        <section id="timeline-panel">
          <h2>Action timeline</h2>
          <div id="timeline"></div>
        </section>
      </div>
    </div>

    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
