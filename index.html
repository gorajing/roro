<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- No 'unsafe-eval': @pixi/unsafe-eval (imported in avatar.ts) patches PixiJS to render without
         string-eval codegen. No 'wasm-unsafe-eval' either: the renderer's only WASM consumer was the
         on-device voice stack, now extracted to packages/voice (PGlite's WASM runs in MAIN, which this
         CSP does not govern). Re-add it with the voice re-integration (packages/voice/README.md). -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:*; font-src 'self' data:;" />
    <title>Roro</title>

  </head>
  <body>
    <div id="app">
      <canvas id="cat-canvas"></canvas>

      <div id="overlay">
        <header id="topbar">
          <div id="brand">Roro</div>
          <div id="powered">Private local brain and memory</div>
          <div id="controls">
            <!-- Header controls mount here at runtime (project settings, Forget panel, the WS5 store
                 fake-door). The Voice Mode / Mute buttons left with the voice stack (packages/voice). -->
          </div>
        </header>

        <!-- Polite live region: every setStatus line (readiness blockers, turn progress, receipts) is
             announced to screen readers — the fail-loud "tell the user what's missing" promise must be audible. -->
        <div id="status" role="status" aria-live="polite">Loading…</div>

        <section id="captions">
          <div id="caption-final" class="caption"></div>
          <div id="caption-partial" class="caption partial"></div>
        </section>

        <!--
          Text-input path — THE turn surface for v0 (voice is cut; see packages/voice).
          Drives the orchestrator pipeline: window.companion.turnRun -> recall[memory2/PGlite]
          -> decide[local Ollama] -> executor[Codex]. See bootstrap.ts.
        -->
        <form id="prompt-form" autocomplete="off">
          <input
            id="prompt-input"
            type="text"
            aria-label="Ask Roro to work on a task"
            placeholder="Ask Roro to work on something..."
          />
          <button id="send-btn" type="submit">Start</button>
          <button id="cancel-btn" type="button" disabled>Stop</button>
        </form>

        <section id="timeline-panel">
          <h2>What Roro is doing</h2>
          <div id="timeline"></div>
        </section>
      </div>
    </div>

    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
